# Fly.io configuration for PAN / Aadhaar Format Validator
# Docs: https://fly.io/docs/reference/configuration/
app = "pan-aadhaar-validator"
primary_region = "sin"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/api/health"
